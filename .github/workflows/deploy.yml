name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Rspack requires Node 20.19+ or 22.12+; use Node 20 for compatibility
          node-version: "20"
          cache: "pnpm"

      - name: Setup pnpm (official)
        uses: pnpm/action-setup@v2
        with:
          version: "8"

      - name: Corepack fallback (ensure pnpm on PATH)
        run: |
          corepack enable || true
          corepack prepare pnpm@latest --activate || true

      - name: Verify environment
        run: |
          node -v
          npm -v
          echo "pnpm: $(which pnpm || 'not found')"
          pnpm -v || true

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml found — using --frozen-lockfile"
            pnpm install --frozen-lockfile
          else
            echo "pnpm-lock.yaml not found — running pnpm install"
            pnpm install
          fi

      - name: Build
        run: pnpm build

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
