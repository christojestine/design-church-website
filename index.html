<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St. Mary's Forane Church</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <meta name="description"
    content="Delivers a modern, secure website for St. Mary's Forane Church featuring updated content, futuristic design, and user-friendly navigation for parishioners." />
    <!-- Also provide PNG favicon (versioned) to improve browser compatibility -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.ico">
  <meta name="robots" content="noindex, nofollow" />
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    #root {
      height: 100%;
    }
  </style>
  <script>
    // Single Page Apps for GitHub Pages — restore the route encoded by 404.html
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>

</head>

<body>

  <div id="root"></div>
  <!-- <script type="module" src="/src/main.tsx"></script> -->

</body>

</html>
