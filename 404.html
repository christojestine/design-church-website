<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>St. Mary's Forane Church</title>
  <script>
    // Single Page Apps for GitHub Pages
    // Redirects the 404 back to index.html with the path encoded in the query string
    // so React Router can restore it on load.
    // pathSegmentsToKeep = 1 for project pages (e.g. /design-church-website/)
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
